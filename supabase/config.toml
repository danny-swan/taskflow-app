# ============================================================================
# Supabase project config — TaskFlow
#
# Здесь фиксируем ТОЛЬКО настройки Edge Functions, которые должны быть
# консистентны между окружениями и деплоями. Всё остальное (db, auth, api...)
# управляется через Dashboard и НЕ дублируется тут, чтобы `supabase functions
# deploy` не перезаписывал серверные настройки неожиданными значениями.
#
# project_id — reference проекта (виден в URL дашборда и в
# https://<project_id>.supabase.co).
# ============================================================================

project_id = "sejpmzrmtgcvevukggkx"

# ─── Edge Functions ─────────────────────────────────────────────────────────
#
# ВАЖНО (v0.9.35-dev.6.9.2, миграция на новые ключи Supabase):
# Проект переведён на publishable/secret API keys. Legacy service_role JWT
# больше не принимается gateway'ем (UNAUTHORIZED_LEGACY_JWT). Новые secret-ключи
# (sb_secret_...) — НЕ JWT, поэтому их нельзя слать в Authorization: Bearer.
#
# Wave 4 PR-A — N14: раньше здесь был перечислен только renew-subscription, а
# verify_jwt остальных функций жил неявно в Dashboard. Теперь фиксируем
# намерение явно для КАЖДОЙ функции — это самодокументируемый источник истины и
# защита от «тихого» дрейфа настроек. `supabase functions deploy <name>` читает
# только секцию [functions.<name>], поэтому деплой одной функции НЕ трогает
# настройки других.
#
# Правило выбора:
#   verify_jwt = true  — функция вызывается клиентом под пользовательским JWT
#                        (supabase.functions.invoke из десктопа/веба);
#   verify_jwt = false — вызов извне без JWT (webhook), из pg_cron/pg_net, или
#                        внутренний вызов с аутентификацией собственным секретом
#                        (x-webhook-secret / x-internal-token). Авторизацию в
#                        этом случае делает сам код функции.
#
# TODO (main-агент): сверить значения ниже с фактическим состоянием в проде
# (Dashboard → Edge Functions) перед массовым передеплоем. В рамках этого PR
# передеплоиваются только функции с CORS-фиксом (N11) — их verify_jwt здесь
# совпадает с прод-состоянием, так что деплой ничего не меняет в поведении.

# ── Вызываются извне / из БД / внутренними секретами → verify_jwt = false ──

# Webhook от ЮKassa: браузерного JWT нет, подпись проверяется в коде.
[functions.payment-webhook]
verify_jwt = false

# Дёргается pg_cron через pg_net без пользовательского JWT; авторизация —
# заголовок x-cron-secret == CRON_SHARED_SECRET (проверяется в коде).
[functions.renew-subscription]
verify_jwt = false

# Внутренний вызов: аутентификация заголовком x-internal-token / service-role.
[functions.send-user-email]
verify_jwt = false

# Внутренний вызов: аутентификация заголовком x-webhook-secret == WEBHOOK_SECRET.
[functions.activation-notify]
verify_jwt = false

# ── Клиентские функции (JWT пользователя) → verify_jwt = true ──

[functions.start-trial]
verify_jwt = true

[functions.cancel-subscription]
verify_jwt = true

[functions.detach-payment-method]
verify_jwt = true

[functions.reactivate-subscription]
verify_jwt = true

[functions.create-payment]
verify_jwt = true

[functions.change-plan]
verify_jwt = true

[functions.delete_account]
verify_jwt = true

[functions.admin-actions]
verify_jwt = true
