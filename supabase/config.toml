# ============================================================================
# Supabase project config — TaskFlow
#
# Здесь фиксируем ТОЛЬКО настройки Edge Functions, которые должны быть
# консистентны между окружениями и деплоями. Всё остальное (db, auth, api...)
# управляется через Dashboard и НЕ дублируется тут, чтобы `supabase functions
# deploy` не перезаписывал серверные настройки неожиданными значениями.
#
# project_id — reference проекта (виден в URL дашборда и в
# https://<project_id>.supabase.co).
# ============================================================================

project_id = "sejpmzrmtgcvevukggkx"

# ─── Edge Functions ─────────────────────────────────────────────────────────
#
# ВАЖНО (v0.9.35-dev.6.9.2, миграция на новые ключи Supabase):
# Проект переведён на publishable/secret API keys. Legacy service_role JWT
# больше не принимается gateway'ем (UNAUTHORIZED_LEGACY_JWT). Новые secret-ключи
# (sb_secret_...) — НЕ JWT, поэтому их нельзя слать в Authorization: Bearer.
#
# N14 (Wave 4): verify_jwt зафиксирован ЯВНО для КАЖДОЙ функции — config.toml
# теперь единый источник истины, а не «настроено где-то на сервере». Значения
# выведены из фактического кода каждой функции (проверено, а не по списку):
#
#   verify_jwt = true  → функция ждёт пользовательский JWT в
#     `Authorization: Bearer <jwt>` и резолвит юзера через `auth.getUser()`.
#     Платформенная проверка = дополнительный слой поверх кода.
#   verify_jwt = false → вызывается НЕ из браузера под user-JWT; авторизацию
#     делает сам код своим секретом, а платформенный gate только помешал бы:
#       payment-webhook    — публичный вебхук ЮKassa (dual-verify GET /v3/payments)
#       renew-subscription — pg_cron, заголовок x-cron-secret (CRON_SHARED_SECRET)
#       activation-notify  — Database Webhook, заголовок x-webhook-secret
#       send-user-email    — cross-function вызов, заголовок x-internal-token
#
# ⚠️ Деплой edge-функций из этой ветки НЕ входит в задачу PR — фиксируем только
# config.toml как источник истины. Runtime уже задеплоенных функций не меняем
# (см. PR-описание). Значения verify_jwt для payment-webhook/renew-subscription
# на проде уже false — совпадают с зафиксированным здесь.

[functions.activation-notify]
verify_jwt = false

[functions.admin-actions]
verify_jwt = true

[functions.cancel-subscription]
verify_jwt = true

[functions.change-plan]
verify_jwt = true

[functions.create-payment]
verify_jwt = true

[functions.delete_account]
verify_jwt = true

[functions.detach-payment-method]
verify_jwt = true

[functions.payment-webhook]
verify_jwt = false

[functions.reactivate-subscription]
verify_jwt = true

[functions.renew-subscription]
verify_jwt = false

[functions.send-user-email]
verify_jwt = false

[functions.start-trial]
verify_jwt = true
