# Supabase keep-alive ping
#
# Проблема: free-tier Supabase-проекты приостанавливаются после 7 дней
# без активности. После пробуждения первые запросы медленные (10-30с),
# а если пауза дольше 90 дней — проект удаляется.
#
# Решение: раз в 3 дня «тыкаем» проект лёгким SELECT-запросом через REST.
# Плюс каждый запуск TaskFlow дополнительно дёргает базу
# (см. src/lib/supabase.ts → pingSupabaseKeepAlive).
#
# v0.9.22
name: Supabase keep-alive

on:
  schedule:
    # Каждые 3 дня в 06:00 UTC.
    # cron: minute hour day-of-month month day-of-week
    - cron: '0 6 */3 * *'
  # Возможность запустить руками из UI Actions
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase REST
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: SELECT 1 from tasks
        env:
          # URL и anon key — из GitHub Secrets (публичные по дизайну, но держим
          # вне кода, чтобы репо не раскрывало project-ref).
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "::error::SUPABASE_URL / SUPABASE_ANON_KEY не заданы в GitHub Secrets"
            exit 1
          fi
          echo "Pinging ${SUPABASE_URL}/rest/v1/tasks..."
          # -f: fail on HTTP >= 400; -s: silent; -S: show errors; --max-time 30
          # RLS без auth вернёт 200 с пустым массивом — этого достаточно, чтобы Supabase считал проект «активным».
          HTTP_CODE=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            --max-time 30 \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/tasks?select=id&limit=1")
          echo "HTTP ${HTTP_CODE}"
          cat /tmp/body.txt || true
          echo ""
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Supabase вернул ${HTTP_CODE}"
            exit 1
          fi
          echo "OK, база отвечает."
