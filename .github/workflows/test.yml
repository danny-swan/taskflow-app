name: Test TaskFlow

# v0.9.20: unit-тесты + typecheck. Отдельный workflow, чтобы:
# - PR-ы получали быстрый статус (Ubuntu-runner ~1 мин вместо Windows-runner ~10 мин),
# - build.yml на теги мог гейтить сборку через needs: test.
# v0.9.21: добавлен job e2e (Playwright + Chromium) — работает в browser-режиме
# через Vite dev-server, обходя auth-gate через ?e2e=1 (dev-only байпас).

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Type-check + unit-тесты
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check TypeScript
        run: npx tsc --noEmit

      - name: Run Vitest
        env:
          # v0.9.35-dev.6.2: vitest.config.ts уже подставляет dummy через `define`,
          # но дублируем в env — на случай если будет код, читающий process.env.
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm test -- --reporter=verbose

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          # v0.9.35-dev.6.2: E2E гонит Vite dev-server, который читает VITE_* из env.
          # Без этого supabase.ts throw'нет на старте и sidebar не отрисуется.
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
