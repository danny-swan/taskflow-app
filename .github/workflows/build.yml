name: Build TaskFlow for Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # v0.9.20: гейт сборки. Тег не соберётся, если падают typecheck/тесты.
  test:
    name: Type-check + unit-тесты
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check TypeScript
        run: npx tsc --noEmit

      - name: Run Vitest
        run: npm test -- --reporter=verbose

  # v0.9.21: E2E-гейт. Тег не соберётся, если сломаны UI-flowы
  # (создание задачи, навигация, переключение тем).
  e2e:
    name: E2E (Playwright)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  build:
    needs: [test, e2e]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      # Typecheck + unit-тесты уже пройдены в job `test` (выше, needs: test),
      # поэтому здесь их не повторяем — экономим время Windows-раннера.

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "Syncing version to $tag"
          # package.json
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $tag
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          # tauri.conf.json
          $tauri = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauri.version = $tag
          $tauri | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          # Cargo.toml — patch version field
          (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*"', "version = `"$tag`"" | Set-Content src-tauri/Cargo.toml

      - name: Build Tauri app (NSIS + MSI, signed for updater)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # v0.9.23: Sentry — клиентский DSN вшивается в bundle (публичный),
          # AUTH_TOKEN + ORG + PROJECT используются sentry-vite-plugin’ом
          # чтобы создать release в Sentry и залить source maps.
          # Если секреты не заданы (fork PR без доступа к secrets),
          # плагин в vite.config.ts сам себя отключает.
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          # v0.9.23: Turnstile site key — публичный, вшивается в bundle.
          # Секретный Secret Key лежит только в Supabase Attack Protection.
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: List build artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/x86_64-pc-windows-msvc/release/bundle -Recurse -File | Select-Object FullName, Length

      - name: Upload NSIS installer (per-user, no admin)
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-NSIS-Installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload updater signatures
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-Updater-Sigs
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.sig
          if-no-files-found: warn

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-MSI-Installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload portable executable
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-Portable
          path: src-tauri/target/x86_64-pc-windows-msvc/release/taskflow.exe
          if-no-files-found: warn

      - name: Generate updater manifest (latest.json)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $nsisPath = Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          $sigPath = Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis" -Filter "*-setup.exe.sig" | Select-Object -First 1
          if (-not $nsisPath -or -not $sigPath) {
            Write-Error "NSIS installer or signature not found — updater manifest cannot be generated"
            exit 1
          }
          $sig = Get-Content $sigPath.FullName -Raw
          $downloadUrl = "https://github.com/danny-swan/taskflow-app/releases/download/$tag/$($nsisPath.Name)"
          $manifest = @{
            version = $version
            notes = "See release notes: https://github.com/danny-swan/taskflow-app/releases/tag/$tag"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig.Trim()
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 10
          $manifest | Set-Content -Path "latest.json" -Encoding UTF8
          Write-Host "=== latest.json ==="
          Get-Content latest.json

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # v0.9.9: .sig файлы больше не публикуем в релизе (они остаются
          # в workflow artifacts для дебага). Подписи для авто-апдейтера уже
          # вшиты в latest.json (поле signature). Пользовательский релиз —
          # чистые 5 файлов: 3 инсталлятора + portable + latest.json.
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/taskflow.exe
            latest.json
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
