name: Build TaskFlow

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # v0.9.20: гейт сборки. Тег не соберётся, если падают typecheck/тесты.
  test:
    name: Type-check + unit-тесты
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check TypeScript
        run: npx tsc --noEmit

      - name: Run Vitest
        run: npm test -- --reporter=verbose

  # v0.9.21: E2E-гейт. Тег не соберётся, если сломаны UI-flowы
  # (создание задачи, навигация, переключение тем).
  e2e:
    name: E2E (Playwright)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  build:
    needs: [test, e2e]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      # Typecheck + unit-тесты уже пройдены в job `test` (выше, needs: test),
      # поэтому здесь их не повторяем — экономим время Windows-раннера.

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "Syncing version to $tag"
          # package.json
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $tag
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          # tauri.conf.json
          $tauri = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tauri.version = $tag
          $tauri | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          # Cargo.toml — patch version field
          (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*"', "version = `"$tag`"" | Set-Content src-tauri/Cargo.toml

      - name: Build Tauri app (NSIS + MSI, signed for updater)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # v0.9.23: Sentry — клиентский DSN вшивается в bundle (публичный),
          # AUTH_TOKEN + ORG + PROJECT используются sentry-vite-plugin’ом
          # чтобы создать release в Sentry и залить source maps.
          # Если секреты не заданы (fork PR без доступа к secrets),
          # плагин в vite.config.ts сам себя отключает.
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          # v0.9.23: Turnstile site key — публичный, вшивается в bundle.
          # Секретный Secret Key лежит только в Supabase Attack Protection.
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: List build artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/x86_64-pc-windows-msvc/release/bundle -Recurse -File | Select-Object FullName, Length

      - name: Upload NSIS installer (per-user, no admin)
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-NSIS-Installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload updater signatures
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-Updater-Sigs
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.sig
          if-no-files-found: warn

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-MSI-Installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload portable executable
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-Portable
          path: src-tauri/target/x86_64-pc-windows-msvc/release/taskflow.exe
          if-no-files-found: warn

      - name: Generate updater manifest (latest.json)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $nsisPath = Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          $sigPath = Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis" -Filter "*-setup.exe.sig" | Select-Object -First 1
          if (-not $nsisPath -or -not $sigPath) {
            Write-Error "NSIS installer or signature not found — updater manifest cannot be generated"
            exit 1
          }
          $sig = Get-Content $sigPath.FullName -Raw
          $downloadUrl = "https://github.com/danny-swan/taskflow-app/releases/download/$tag/$($nsisPath.Name)"
          $manifest = @{
            version = $version
            notes = "See release notes: https://github.com/danny-swan/taskflow-app/releases/tag/$tag"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig.Trim()
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 10
          $manifest | Set-Content -Path "latest.json" -Encoding UTF8
          Write-Host "=== latest.json ==="
          Get-Content latest.json

      - name: Upload latest.json (Windows part)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: latest-windows
          path: latest.json
          if-no-files-found: warn

      - name: Upload Windows bundle for release job
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-files
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/taskflow.exe
          if-no-files-found: warn

  # v0.9.32: macOS вариант A — unsigned .dmg через Universal Binary
  # (aarch64 + x86_64 в одном файле). Запускается на macos-14 (Apple Silicon runner).
  # Пользователи обойдут Gatekeeper через инструкцию в release notes.
  build-macos:
    needs: [test, e2e]
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          echo "Syncing version to $VER"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$VER';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));p.version='$VER';fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(p,null,2)+'\n');"
          sed -i '' "s/^version = \".*\"/version = \"$VER\"/" src-tauri/Cargo.toml

      - name: Build Tauri app (Universal .dmg, unsigned)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          # Вариант A: без Apple Developer ID — подпись не ставится,
          # пользователь обойдёт Gatekeeper вручную.
          APPLE_SIGNING_IDENTITY: '-'
        run: npm run tauri:build -- --target universal-apple-darwin --bundles dmg

      - name: List macOS build artifacts
        run: |
          find src-tauri/target/universal-apple-darwin/release/bundle -type f | head -30

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-macOS-DMG
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload macOS release files
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-files
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  # v0.9.32: объединённый release-job — скачивает артефакты
  # обоих платформ и публикует GitHub Release одним списком.
  #
  # v0.9.35: разделение на stable / pre-release каналы.
  # Теги вида v1.2.3           → stable release, latest.json обновляется (auto-updater подтянет).
  # Теги вида v1.2.3-dev.N     → pre-release, latest.json НЕ публикуется (юзеры остаются на stable).
  # Теги вида v1.2.3-beta.N    → pre-release, latest.json НЕ публикуется.
  # Теги вида v1.2.3-rc.N      → pre-release, latest.json НЕ публикуется.
  release:
    needs: [build, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine release channel
        id: channel
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ -(dev|beta|rc|alpha)(\.[0-9]+)?$ ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "publish_latest_json=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG → pre-release channel (latest.json will NOT be updated)"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "publish_latest_json=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG → stable channel (latest.json WILL be updated)"
          fi

      - name: Download Windows release files
        uses: actions/download-artifact@v4
        with:
          name: windows-release-files
          path: release-files/windows

      - name: Download latest.json
        if: steps.channel.outputs.publish_latest_json == 'true'
        uses: actions/download-artifact@v4
        with:
          name: latest-windows
          path: release-files

      - name: Download macOS release files
        uses: actions/download-artifact@v4
        with:
          name: macos-release-files
          path: release-files/macos

      - name: List release files
        run: find release-files -type f

      - name: Create Stable Release
        if: steps.channel.outputs.is_prerelease == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/windows/**/*.exe
            release-files/windows/**/*.msi
            release-files/windows/taskflow.exe
            release-files/macos/**/*.dmg
            release-files/latest.json
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pre-Release (no latest.json)
        if: steps.channel.outputs.is_prerelease == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/windows/**/*.exe
            release-files/windows/**/*.msi
            release-files/windows/taskflow.exe
            release-files/macos/**/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
